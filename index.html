<!DOCTYPE html>
<html>
<head>
    <title>For Shristi ❤️</title>

    <style>
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: Arial;
            overflow: hidden;
            text-align: center;
        }

        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #ff4d6d;
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }

        #message {
            display: none;
            font-size: 2rem;
            color: #ff4d6d;
            margin-top: 20px;
            animation: glow 1s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #ff4d6d; }
            to { text-shadow: 0 0 30px #ff4d6d; }
        }

        .photo {
            display: none;
            margin-top: 20px;
            border-radius: 20px;
            width: 250px;
            box-shadow: 0 0 30px #ff4d6d;
        }

        .heart {
            position: absolute;
            color: red;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        #proposal {
            display: none;
            font-size: 2.5rem;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <button onclick="startLove()">Click Me ❤️</button>

    <div id="message">I love you, Shristi Maurya 💖</div>

    <img id="photo" class="photo" src="photo.jpg">

    <div id="proposal">Will you be mine forever? 💍</div>

</div>

<audio id="music" src="song.mp3" loop></audio>

<script>
function startLove() {
    document.getElementById("message").style.display = "block";
    document.getElementById("photo").style.display = "block";

    setTimeout(() => {
        document.getElementById("proposal").style.display = "block";
    }, 3000);

    document.getElementById("music").play();

    setInterval(createHeart, 300);
}

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}
</script>

</body>
</html>
