<!DOCTYPE html>
<html>
<head>
<title>For Shristi ❤️</title>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: #2c2c2c;
    font-family: 'Segoe UI', Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
}

/* Text */
#text {
    font-size: 2rem;
    max-width: 80%;
    opacity: 0;
    transition: opacity 1s;
}

/* Photo */
#photo {
    display: none;
    width: 250px;
    border-radius: 20px;
    margin-top: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    opacity: 0;
    transition: opacity 1.5s;
}

/* Button */
button {
    position: absolute;
    bottom: 50px;
    padding: 12px 25px;
    font-size: 1rem;
    background: #ff4d6d;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

/* Hearts */
.heart {
    position: absolute;
    color: #ff4d6d;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div>
    <div id="text"></div>
    <img id="photo" src="us.jpg">
</div>

<button onclick="next()">Next ❤️</button>

<script>
const lines = [
"I didn’t plan this…",
"But somewhere along the way…",
"You became important to me",
"Your smile, your presence… everything",
"Made my days better without me even realizing it",
"And one day…",
"I just knew",
"I love you, Shristi ❤️",
"So here I am…",
"Asking something from my heart",
"Will you be mine? 💍"
];

let i = 0;

function next() {
    if (i < lines.length) {
        const text = document.getElementById("text");
        text.style.opacity = 0;

        setTimeout(() => {
            text.innerText = lines[i];
            text.style.opacity = 1;
        }, 400);

        // Show photo at key moment
        if (lines[i] === "I just knew") {
            const photo = document.getElementById("photo");
            photo.style.display = "block";
            setTimeout(() => photo.style.opacity = 1, 200);
        }

        i++;
    } else {
        document.querySelector("button").style.display = "none";
    }
}

/* Floating hearts */
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}

setInterval(createHeart, 400);
</script>

</body>
</html>
